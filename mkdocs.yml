site_name: Hypergrid
site_description: N-dimensional histogram library for multivariate data
repo_url: https://github.com/Clems6323/hypergrid
repo_name: Clems6323/hypergrid

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            members_order: source
  - mkdocs-jupyter:
      execute: false
      include_source: true

nav:
  - Home: index.md
  - Concepts:
      - Distance metrics: concepts/distance_metrics.md
      - Binning rules: concepts/binning_rules.md
      - Rebinning strategy: concepts/rebinning_strategy.md
      - Temporal decay: concepts/temporal_decay.md
  - API Reference:
      - Base classes: api/base_classes.md
      - Grid classes: api/grid_classes.md
      - Mixins: api/mixins.md
      - Storage backend: api/storage.md
      - Utilities: api/utilities.md
  - Examples:
      - Basic usage: examples/01_basic.ipynb
      - Comparing distributions: examples/02_comparison.ipynb
      - Adaptive grids: examples/03_adaptive.ipynb
      - Temporal tracking: examples/04_temporal.ipynb

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - tables

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css: []
